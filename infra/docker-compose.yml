name: b3-quant-dev

x-api-base: &api-base
  build:
    context: ..
    dockerfile: Dockerfile.api
  env_file:
    - ${B3_INFRA_ENV_FILE:-./.env.example}
  working_dir: /app
  volumes:
    - ../src:/app/src
    - ../sql:/app/sql
    - ../README.md:/app/README.md:ro
    - ../pyproject.toml:/app/pyproject.toml:ro
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_started
    lake-bootstrap:
      condition: service_completed_successfully
  restart: unless-stopped

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: b3ml
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d b3ml"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    tmpfs:
      - /var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"

  lake-r2:
    image: minio/minio:RELEASE.2025-02-07T23-21-09Z
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: ["server", "/data", "--console-address", ":9001"]
    ports:
      - "9000:9000"
      - "9001:9001"
    tmpfs:
      - /data

  lake-bootstrap:
    image: minio/mc:RELEASE.2025-02-08T19-14-21Z
    env_file:
      - ${B3_INFRA_ENV_FILE:-./.env.example}
    depends_on:
      - lake-r2
    entrypoint: >-
      /bin/sh -c '
      mc alias set local http://lake-r2:9000 $$B3_R2_ACCESS_KEY_ID $$B3_R2_SECRET_ACCESS_KEY &&
      mc mb --ignore-existing local/$$B3_R2_BUCKET_BRONZE &&
      mc mb --ignore-existing local/$$B3_R2_BUCKET_SILVER &&
      mc mb --ignore-existing local/$$B3_R2_BUCKET_ARTIFACTS
      '

  api:
    <<: *api-base
    environment:
      B3_SERVICE_NAME: api
    command: ["uvicorn", "b3_quant_platform.api.main:app", "--host", "0.0.0.0", "--port", "8080", "--reload"]
    ports:
      - "8080:8080"

  worker-ingestion:
    <<: *api-base
    environment:
      B3_SERVICE_NAME: worker-ingestion
    command: ["uvicorn", "b3_quant_platform.api.main:app", "--host", "0.0.0.0", "--port", "8080"]

  worker-feature-store:
    <<: *api-base
    environment:
      B3_SERVICE_NAME: worker-feature-store
    command: ["uvicorn", "b3_quant_platform.api.main:app", "--host", "0.0.0.0", "--port", "8080"]

  worker-forecast:
    <<: *api-base
    environment:
      B3_SERVICE_NAME: worker-forecast
    command: ["uvicorn", "b3_quant_platform.api.main:app", "--host", "0.0.0.0", "--port", "8080"]

  worker-simulation:
    <<: *api-base
    environment:
      B3_SERVICE_NAME: worker-simulation
    command: ["uvicorn", "b3_quant_platform.api.main:app", "--host", "0.0.0.0", "--port", "8080"]

  worker-eod:
    <<: *api-base
    environment:
      B3_SERVICE_NAME: worker-eod
    command: ["uvicorn", "b3_quant_platform.api.main:app", "--host", "0.0.0.0", "--port", "8080"]

  dashboard-streamlit:
    build:
      context: ..
      dockerfile: Dockerfile.dashboard
    env_file:
      - ${B3_INFRA_ENV_FILE:-./.env.example}
    working_dir: /app
    volumes:
      - ../src:/app/src
      - ../README.md:/app/README.md:ro
      - ../pyproject.toml:/app/pyproject.toml:ro
    depends_on:
      api:
        condition: service_started
    environment:
      B3_CLOUD_RUN_BASE_URL: http://api:8080
      B3_API_PREFIX: /v1
    command: ["streamlit", "run", "src/b3_quant_platform/dashboard/app.py", "--server.address=0.0.0.0", "--server.port=8501"]
    ports:
      - "8501:8501"
    restart: unless-stopped
